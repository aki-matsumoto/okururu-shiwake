name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  syntax-check:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: node --check all JS
        run: |
          set -e
          fail=0
          for f in $(find . -type f -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*"); do
            if ! node --check "$f"; then echo "❌ $f"; fail=1; else echo "✓ $f"; fi
          done
          [ $fail -eq 0 ] || { echo "::error::syntax errors"; exit 1; }

  manifest-validation:
    name: manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: validate manifest + referenced files
        run: |
          set -e
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
          node -e "const fs=require('fs');const m=JSON.parse(fs.readFileSync('manifest.json','utf8'));let miss=0;for(const cs of (m.content_scripts||[]))for(const f of (cs.js||[])){if(!fs.existsSync(f)){console.error('missing '+f);miss++}else console.log('✓ '+f)};if(m.background&&m.background.service_worker&&!fs.existsSync(m.background.service_worker)){console.error('missing bg');miss++};if(miss)process.exit(1)"

  unit-tests:
    name: Unit tests (node)
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/run-tests.js

  build:
    name: Build zip
    runs-on: ubuntu-latest
    needs: [syntax-check, manifest-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/build-zip.js
      - uses: actions/upload-artifact@v4
        with:
          name: okururu-shiwake-zip
          path: dist/*.zip
          retention-days: 30

  tag-release:
    name: Auto-tag release + update feed
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: read version
        id: v
        run: echo "tag=v$(node -e "console.log(require('./manifest.json').version)")" >> $GITHUB_OUTPUT
      - name: check tag
        id: c
        run: |
          if git rev-parse "${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi
      - name: create tag
        if: steps.c.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.v.outputs.tag }}" -m "Release ${{ steps.v.outputs.tag }} (CI)"
          git push origin "${{ steps.v.outputs.tag }}"
      - name: update latest.json
        if: steps.c.outputs.exists == 'false'
        run: |
          node scripts/update-release-feed.js
          if git diff --quiet release/latest.json; then echo "no change"; else
            git add release/latest.json
            git commit -m "chore(release): latest.json ${{ steps.v.outputs.tag }} [skip ci]"
            git push origin HEAD:main
          fi
